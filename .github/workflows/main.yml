name: Main Taski workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    # Блок services аналогичен docker-compose.yml
    services:
      postgres:
        image: postgres:13.10
        # Указываем имя тестовой базы, имя и пароль пользователя в открытом виде,
        # ведь эта база будет работать только во время прогона тестов
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: <PASSWORD>
          POSTGRES_DB: django_db
        ports:
          - 5432:5432
        # Эта конструкция описывает проверку готовности сервиса postgres
        # Если её не будет, то тесты могут запуститься раньше, чем сервер PostgreSQL
        # В результате тесты опять решат, что базы нет, — и упадут
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install flake8==7.3.0 flake8-isort==7.0.0
        pip install -r ./backend/requirements.txt 
    # Этот шаг дополним переменными для доступа к БД
    - name: Test with flake8 and django tests
      # Добавляем env-переменные для доступа к БД
      env:
        POSTGRES_USER: django_user
        POSTGRES_PASSWORD: <PASSWORD>
        POSTGRES_DB: django_db
        # Сервер БД запущен в Docker, но его порт проброшен на хост
        # Поэтому подключаемся к 127.0.0.1:5432
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
      run: |
        python -m flake8 backend/
        cd backend/
        python manage.py test

  build_and_push_to_cloud.ru:
    name: Push Docker image to Cloud.ru
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out the repo
        # Получение исходного кода из репозитория
        uses: actions/checkout@v3
        # Установка сборщика контейнеров Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Cloud.ru Container Registry
        # Авторизация в Cloud.ru
        uses: docker/login-action@v2
        with:
          registry: sergeipronin.cr.cloud.ru  # URI вашего реестра
          username: ${{ secrets.CLOUD_USERNAME }}
          password: ${{ secrets.CLOUD_PASSWORD }}
      - name: Push to Cloud.ru
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: |
            sergeipronin.cr.cloud.ru/taski_backend:latest

  frontend_tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up nodeJS
      # Это готовый воркфлоу для установки Node.js на раннер
      uses: actions/setup-node@v3
      with:
        # Это параметр воркфлоу, указывающий нужную версию Node.js
        node-version: 18

    - name: Install dependencies
      # Эта команда устанавливает зависимости для фронтенда
      run: |
        cd frontend/
        npm ci

    - name: Test frontend
      # Запускаем тесты
      run: |
        cd frontend/
        npm run test

  build_frontend_and_push_to_cloud:
    name: Push frontend Docker image to Cloud.ru
    runs-on: ubuntu-latest
    needs: frontend_tests
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Cloud.ru Container Registry
        uses: docker/login-action@v2
        with:
          registry: sergeipronin.cr.cloud.ru
          username: ${{ secrets.CLOUD_USERNAME }}
          password: ${{ secrets.CLOUD_PASSWORD }}
      - name: Push to Cloud.ru
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: sergeipronin.cr.cloud.ru/taski_frontend:latest

  build_gateway_and_push_to_cloude:
    name: Push gateway Docker image to Cloude.ru
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Cloud.ru Container Registry
        uses: docker/login-action@v2
        with:
          registry: sergeipronin.cr.cloud.ru
          username: ${{ secrets.CLOUD_USERNAME }}
          password: ${{ secrets.CLOUD_PASSWORD }}
      - name: Push to Cloud.ru
        uses: docker/build-push-action@v4
        with:
          context: ./gateway/
          push: true
          tags: sergeipronin.cr.cloud.ru/taski_gateway:latest
